[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "m2k-skills-tools"
version = "0.2.0"
description = "A pretty terminal manager for installing and updating M2K skills."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Non-Commercial" }
authors = [
  { name = "mini2kai" }
]
dependencies = [
  "httpx>=0.27",
  "inquirerpy>=0.3.4",
  "rich>=13.7",
  "textual>=0.89",
  "typer>=0.12"
]

[project.urls]
Homepage = "https://github.com/mini2kai/m2k-skills"
Repository = "https://github.com/mini2kai/m2k-skills"

[project.scripts]
m2k-skills-tools = "m2k_skills_tools.cli:app"
