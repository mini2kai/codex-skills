<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Page Tool</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1e2528;
        background: #f4f7f5;
      }
      main { max-width: 1040px; margin: 0 auto; padding: 28px 18px 48px; }
      header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
      h1 { margin: 0; font-size: clamp(1.8rem, 6vw, 3.8rem); line-height: 1; letter-spacing: 0; }
      .shell { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
      .panel { border: 1px solid #cbd6d0; border-radius: 8px; background: #fff; padding: 18px; }
      label { display: block; font-weight: 700; margin-bottom: 8px; }
      textarea { width: 100%; min-height: 220px; resize: vertical; border: 1px solid #b9c7c0; border-radius: 6px; padding: 12px; font: inherit; }
      button { min-height: 40px; border: 1px solid #1e2528; border-radius: 6px; background: #1e2528; color: #fff; padding: 0 14px; font-weight: 700; cursor: pointer; }
      .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .metric { border: 1px solid #d8e0dc; border-radius: 8px; padding: 14px; background: #f8faf9; }
      .metric strong { display: block; font-size: 1.8rem; }
      @media (max-width: 760px) { .shell, .metrics { grid-template-columns: 1fr; } header { align-items: flex-start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p>Single page tool</p>
          <h1>文本统计工具</h1>
        </div>
        <button id="clear">清空</button>
      </header>
      <section class="shell">
        <div class="panel">
          <label for="input">输入内容</label>
          <textarea id="input" placeholder="把要分析的文本粘贴到这里"></textarea>
        </div>
        <div class="panel metrics" aria-live="polite">
          <div class="metric"><span>字符数</span><strong id="chars">0</strong></div>
          <div class="metric"><span>词数</span><strong id="words">0</strong></div>
          <div class="metric"><span>行数</span><strong id="lines">0</strong></div>
        </div>
      </section>
    </main>
    <script>
      const input = document.getElementById('input');
      const chars = document.getElementById('chars');
      const words = document.getElementById('words');
      const lines = document.getElementById('lines');
      const render = () => {
        const text = input.value;
        chars.textContent = String(text.length);
        words.textContent = String((text.trim().match(/\S+/g) || []).length);
        lines.textContent = String(text ? text.split(/\r?\n/).length : 0);
      };
      input.addEventListener('input', render);
      document.getElementById('clear').addEventListener('click', () => { input.value = ''; render(); input.focus(); });
      render();
    </script>
  </body>
</html>
